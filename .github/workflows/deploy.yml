name: Auto Deploy to Lightsail Server
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{SERVER_HOST }}
          username: ${{SERVER_USER }}
          key: ${{SERVER_SSH_KEY }}
          script: |
            cd /bitnami/wordpress/wp-content/plugins/cpm-humanblockchain
            git pull origin main